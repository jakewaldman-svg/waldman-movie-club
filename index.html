<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waldman Movie Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #1a1a1c;
  --surface2: #242426;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f0;
  --muted: #888;
  --muted2: #555;
  --accent: #e8c547;
  --radius: 10px;

  --action: #D85A30;
  --comedy: #4A90D9;
  --sports: #2eaa72;
  --thriller: #9B8FE8;
  --drama: #C4832A;
  --scifi: #1DA882;
  --crime: #7B6FD4;
  --coming: #C45A3A;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; min-height: 100vh; }

/* SCREENS */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* PROFILE PICKER */
#screen-profiles { display: none; align-items: center; justify-content: center; flex-direction: column; min-height: 100vh; padding: 2rem; }
#screen-profiles.active { display: flex; }
.app-title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 2px; color: var(--accent); margin-bottom: 4px; }
.app-sub { color: var(--muted); font-size: 14px; margin-bottom: 3rem; letter-spacing: 0.05em; }
.profile-grid { display: flex; gap: 1.25rem; flex-wrap: wrap; justify-content: center; }
.profile-tile { background: var(--surface); border: 1.5px solid var(--border2); border-radius: 16px; padding: 2rem 2.5rem; cursor: pointer; text-align: center; transition: transform 0.15s, border-color 0.15s; min-width: 140px; }
.profile-tile:hover { transform: translateY(-3px); border-color: var(--accent); }
.profile-emoji { font-size: 44px; margin-bottom: 0.75rem; }
.profile-name { font-size: 16px; font-weight: 600; color: var(--text); }
.profile-dot { width: 10px; height: 10px; border-radius: 50%; margin: 0.5rem auto 0; }
.add-profile { background: transparent; border: 1.5px dashed var(--border2); color: var(--muted); }
.add-profile:hover { border-color: var(--accent); color: var(--accent); }

/* SETUP MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; }
.modal h2 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
.modal label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 0.4rem; }
.modal input[type=text] { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 15px; margin-bottom: 1rem; }
.emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.emoji-opt { font-size: 24px; cursor: pointer; padding: 6px 8px; border-radius: 8px; border: 2px solid transparent; }
.emoji-opt.selected { border-color: var(--accent); background: rgba(232,197,71,0.1); }
.color-grid { display: flex; gap: 10px; margin-bottom: 1.5rem; }
.color-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
.color-opt.selected { border-color: white; }
.btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
.btn-primary { background: var(--accent); color: #111; }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text); margin-right: 8px; }
.btn:hover { opacity: 0.85; }

/* MAIN APP */
#screen-main { padding-bottom: 4rem; }
.topbar { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0.75rem 1.25rem; display: flex; align-items: center; gap: 1rem; }
.topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--accent); letter-spacing: 1px; flex: 1; }
.current-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border2); font-size: 13px; color: var(--text); background: var(--surface); }
.current-profile:hover { border-color: var(--accent); }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 1.25rem; }
.tab { padding: 0.85rem 1.1rem; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* DASHBOARD */
#tab-dashboard { padding: 1.5rem 1.25rem; }
.dash-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--accent); line-height: 1; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.dash-section { margin-bottom: 1.5rem; }
.dash-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; font-weight: 600; }
.dash-movie-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.dash-movie-row:last-child { border-bottom: none; }
.dash-movie-info { flex: 1; }
.dash-movie-title { font-size: 14px; font-weight: 500; }
.dash-movie-year { font-size: 12px; color: var(--muted); }
.discuss-flag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(232,197,71,0.15); color: var(--accent); border: 1px solid rgba(232,197,71,0.3); }
.mini-avatars { display: flex; gap: 4px; }
.mini-avatar { width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; opacity: 0.35; }
.mini-avatar.watched { opacity: 1; }
.stars-mini { color: var(--accent); font-size: 12px; }

/* FILM LIST */
#tab-films { padding: 1rem 1.25rem; }
.films-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
.films-search { flex: 1; min-width: 180px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 14px; }
.genre-pill { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; }
.genre-pill.on { color: #111; font-weight: 500; }
.cluster-block { margin-bottom: 2rem; }
.cluster-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; padding-bottom: 8px; border-bottom: 1.5px solid; }
.cluster-genre-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
.cluster-name { font-size: 15px; font-weight: 600; color: var(--text); }
.cluster-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; font-style: italic; line-height: 1.5; }
.film-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 8px; }
.film-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; border-left: 3px solid; position: relative; }
.film-card:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }
.film-card-num { font-size: 10px; color: var(--muted2); margin-bottom: 3px; }
.film-card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
.film-card-year { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.film-card-note { font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.35; margin-bottom: 8px; }
.film-card-footer { display: flex; align-items: center; justify-content: space-between; }
.watch-dots { display: flex; gap: 3px; }
.watch-dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--border2); }
.watch-dot.seen { border-color: transparent; }

/* FILM DETAIL MODAL */
#modal-film .modal { max-width: 520px; }
.film-detail-header { margin-bottom: 1.25rem; }
.film-detail-genre { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 6px; }
.film-detail-title { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 1px; line-height: 1; margin-bottom: 4px; }
.film-detail-meta { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.film-detail-note { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.6; padding: 10px 14px; background: var(--surface2); border-radius: 8px; margin-bottom: 1.25rem; border-left: 3px solid var(--accent); }
.ratings-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.25rem; }
.rating-row { background: var(--surface2); border-radius: 10px; padding: 12px 14px; }
.rating-row-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.rating-row-emoji { font-size: 20px; }
.rating-row-name { font-size: 13px; font-weight: 600; }
.rating-row-badge { font-size: 11px; color: var(--muted); margin-left: auto; }
.star-row { display: flex; gap: 6px; margin-bottom: 8px; }
.star { font-size: 22px; cursor: pointer; color: var(--muted2); transition: color 0.1s, transform 0.1s; }
.star:hover, .star.lit { color: var(--accent); }
.star:hover { transform: scale(1.15); }
.reaction-input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 12px; font-family: 'Inter', sans-serif; resize: none; }
.reaction-input::placeholder { color: var(--muted2); }
.reaction-display { font-size: 13px; color: var(--muted); font-style: italic; }
.watched-toggle { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.toggle-switch { position: relative; width: 36px; height: 20px; cursor: pointer; }
.toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track { position: absolute; inset: 0; background: var(--surface); border: 1.5px solid var(--border2); border-radius: 20px; transition: background 0.2s; }
.toggle-track.on { background: var(--accent); border-color: var(--accent); }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--muted); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
.toggle-track.on .toggle-thumb { transform: translateX(16px); background: #111; }
.toggle-label { font-size: 13px; color: var(--muted); }
.discuss-btn { width: 100%; margin-top: 0.5rem; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border2); background: transparent; color: var(--muted); transition: all 0.15s; }
.discuss-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.08); }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--surface2); border: none; color: var(--muted); font-size: 18px; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { color: var(--text); }
#modal-film .modal { position: relative; max-height: 90vh; overflow-y: auto; }

/* DISCUSS TAB */
#tab-discuss { padding: 1.5rem 1.25rem; }
.discuss-empty { text-align: center; color: var(--muted); padding: 3rem 0; }
.discuss-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.discuss-card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.discuss-card-cluster { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.discuss-reactions { display: flex; flex-direction: column; gap: 6px; }
.discuss-reaction-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; }
.discuss-reaction-emoji { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.discuss-reaction-text { color: var(--muted); font-style: italic; }
.discuss-reaction-stars { color: var(--accent); font-size: 12px; }

/* TOAST */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 18px; font-size: 14px; z-index: 200; transition: transform 0.25s; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* GENRE COLORS */
.g-Action    { --gc: #D85A30; }
.g-Comedy    { --gc: #4A90D9; }
.g-Sports    { --gc: #2eaa72; }
.g-Thriller  { --gc: #9B8FE8; }
.g-Drama     { --gc: #C4832A; }
.g-Sci-Fi    { --gc: #1DA882; }
.g-Crime     { --gc: #7B6FD4; }
.g-Coming-of-Age { --gc: #C45A3A; }
</style>
</head>

<!-- PROFILE PICKER -->
<div id="screen-profiles" class="screen active">
  <div class="app-title">WALDMAN<br>MOVIE CLUB</div>
  <div class="app-sub">Who's watching?</div>
  <div class="profile-grid" id="profile-grid"></div>
  <div style="margin-top:1.5rem">
    <button class="profile-tile add-profile" onclick="openAddProfile()" style="min-width:120px;padding:1.5rem 2rem">
      <div style="font-size:32px;margin-bottom:0.5rem">+</div>
      <div style="font-size:14px">Add profile</div>
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="screen-main" class="screen">
  <div class="topbar">
    <div class="topbar-title">WMC</div>
    <div class="current-profile" id="topbar-profile" onclick="switchProfile()">
      <span id="topbar-emoji"></span>
      <span id="topbar-name"></span>
      <span style="color:var(--muted);font-size:11px">▾</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('dashboard')">Home</div>
    <div class="tab" onclick="switchTab('films')">Films</div>
    <div class="tab" onclick="switchTab('discuss')">Discuss</div>
  </div>

  <div id="tab-dashboard">
    <div class="dash-stats" id="dash-stats"></div>
    <div class="dash-section">
      <div class="dash-section-title">Recently watched</div>
      <div id="dash-recent"></div>
    </div>
    <div class="dash-section">
      <div class="dash-section-title">Flag for discussion</div>
      <div id="dash-discuss"></div>
    </div>
    <div class="dash-section">
      <div class="dash-section-title">Up next for you</div>
      <div id="dash-upnext"></div>
    </div>
  </div>

  <div id="tab-films" style="display:none">
    <div class="films-controls">
      <input class="films-search" type="text" placeholder="Search films..." id="films-search" oninput="renderFilms()">
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="genre-filters"></div>
    </div>
    <div id="films-list"></div>
  </div>

  <div id="tab-discuss" style="display:none">
    <div id="discuss-list"></div>
  </div>
</div>

<!-- ADD PROFILE MODAL -->
<div class="modal-overlay" id="modal-add-profile">
  <div class="modal">
    <h2>Add profile</h2>
    <label>Name</label>
    <input type="text" id="new-profile-name" placeholder="e.g. Jake, Genny...">
    <label>Pick an emoji</label>
    <div class="emoji-grid" id="emoji-grid"></div>
    <label>Pick a color</label>
    <div class="color-grid" id="color-grid"></div>
    <button class="btn btn-ghost" onclick="closeModal('modal-add-profile')">Cancel</button>
    <button class="btn btn-primary" onclick="saveProfile()">Add profile</button>
  </div>
</div>

<!-- FILM DETAIL MODAL -->
<div class="modal-overlay" id="modal-film">
  <div class="modal" id="film-modal-content">
    <button class="modal-close" onclick="closeModal('modal-film')">✕</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

  c.films.forEach((f, fi) => {
    allFilms.push({ ...f, cluster: c.name, genre: c.genre, clusterIdx: ci, filmIdx: fi, num: filmNum++ });
  });
});

// SUPABASE HELPERS
async function sb(path, opts={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) { const t = await res.text(); console.error(path, t); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadProfiles() {
  const data = await sb('profiles?order=created_at');
  profiles = data || [];
}

async function loadRatings() {
  const data = await sb('ratings?select=*');
  ratings = {};
  (data || []).forEach(r => {
    if (!ratings[r.movie_id]) ratings[r.movie_id] = {};
    ratings[r.movie_id][r.profile_id] = r;
  });
}

async function upsertRating(movieId, profileId, patch) {
  const existing = ratings[movieId]?.[profileId];
  if (existing && existing.id) {
    await fetch(SUPABASE_URL + '/rest/v1/ratings?id=eq.' + existing.id, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(patch)
    });
  } else {
    const res = await fetch(SUPABASE_URL + '/rest/v1/ratings', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=representation'
      },
      body: JSON.stringify({ movie_id: movieId, profile_id: profileId, ...patch })
    });
    if (res.ok) {
      const rows = await res.json();
      if (rows && rows[0]) {
        if (!ratings[movieId]) ratings[movieId] = {};
        ratings[movieId][profileId] = { ...ratings[movieId]?.[profileId], ...rows[0] };
      }
    } else {
      const err = await res.text();
      console.error('upsertRating failed:', err);
    }
  }
}

// INIT

  await loadProfiles();
  await loadRatings();
  renderProfilePicker();
}

// PROFILE PICKER
function renderProfilePicker() {
  const grid = document.getElementById('profile-grid');
  grid.innerHTML = profiles.map(p => `
    <div class="profile-tile" onclick="selectProfile('${p.id}')">
      <div class="profile-emoji">${p.emoji}</div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-dot" style="background:${p.color}"></div>
    </div>
  `).join('');
}

function selectProfile(id) {
  currentProfile = profiles.find(p => p.id === id);
  document.getElementById('topbar-emoji').textContent = currentProfile.emoji;
  document.getElementById('topbar-name').textContent = currentProfile.name;
  showScreen('main');
  switchTab('dashboard');
}

function switchProfile() {
  showScreen('profiles');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ADD PROFILE
function openAddProfile() {
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0];
  document.getElementById('new-profile-name').value = '';

  const eg = document.getElementById('emoji-grid');
  eg.innerHTML = EMOJIS.map((e,i) => `<div class="emoji-opt${i===0?' selected':''}" onclick="pickEmoji('${e}',this)">${e}</div>`).join('');

  const cg = document.getElementById('color-grid');
  cg.innerHTML = COLORS.map((c,i) => `<div class="color-opt${i===0?' selected':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('');

  document.getElementById('modal-add-profile').classList.add('open');
}

function pickEmoji(e, el) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}

function pickColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-opt').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
}

async function saveProfile() {
  const name = document.getElementById('new-profile-name').value.trim();
  if (!name) { showToast('Enter a name first'); return; }
  const rows = await sb('profiles', {
    method: 'POST', prefer: 'return=representation',
    body: { name, emoji: selectedEmoji, color: selectedColor }
  });
  if (rows && rows[0]) {
    profiles.push(rows[0]);
    renderProfilePicker();
    closeModal('modal-add-profile');
    showToast('Profile added!');
  }
}

// TABS
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['dashboard','films','discuss'][i] === tab);
  });
  ['dashboard','films','discuss'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'films') renderFilms();
  if (tab === 'discuss') renderDiscuss();
}

// DASHBOARD
function renderDashboard() {
  if (!currentProfile) return;
  const pid = currentProfile.id;
  const myRatings = Object.entries(ratings).map(([mid, r]) => r[pid]).filter(Boolean);
  const watched = myRatings.filter(r => r.watched);
  const total = allFilms.length;

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${watched.length}</div><div class="stat-label">Films watched</div></div>
    <div class="stat-card"><div class="stat-val">${total - watched.length}</div><div class="stat-label">Still to watch</div></div>
    <div class="stat-card"><div class="stat-val">${Math.round(watched.length/total*100)}%</div><div class="stat-label">Complete</div></div>
    <div class="stat-card"><div class="stat-val">${myRatings.filter(r=>r.stars).length}</div><div class="stat-label">Rated</div></div>
  `;

  // recently watched
  const recent = watched.sort((a,b) => new Date(b.watched_at||b.created_at) - new Date(a.watched_at||a.created_at)).slice(0,5);
  document.getElementById('dash-recent').innerHTML = recent.length ? recent.map(r => {
    const film = allFilms.find(f => f.id === r.movie_id);
    if (!film) return '';
    return `<div class="dash-movie-row" onclick="openFilm('${film.id}')">
      <div class="dash-movie-info">
        <div class="dash-movie-title">${film.t}</div>
        <div class="dash-movie-year">${film.y} · ${film.cluster}</div>
      </div>
      ${r.stars ? `<div class="stars-mini">${'★'.repeat(r.stars)}</div>` : ''}
    </div>`;
  }).join('') : '<div style="color:var(--muted);font-size:13px;padding:0.5rem 0">No films watched yet. Head to Films to get started.</div>';

  // discuss flags
  const discussFilms = allFilms.filter(f => {
    return profiles.some(p => ratings[f.id]?.[p.id]?.discuss);
  });
  document.getElementById('dash-discuss').innerHTML = discussFilms.length ? discussFilms.slice(0,5).map(film => {
    const flaggers = profiles.filter(p => ratings[film.id]?.[p.id]?.discuss).map(p => p.emoji).join(' ');
    return `<div class="dash-movie-row" onclick="openFilm('${film.id}')">
      <div class="dash-movie-info">
        <div class="dash-movie-title">${film.t}</div>
        <div class="dash-movie-year">${film.y}</div>
      </div>
      <span class="discuss-flag">${flaggers} wants to talk</span>
    </div>`;
  }).join('') : '<div style="color:var(--muted);font-size:13px;padding:0.5rem 0">No films flagged for discussion yet.</div>';

  // up next (first unwatched)
  const unwatched = allFilms.filter(f => !ratings[f.id]?.[pid]?.watched).slice(0,3);
  document.getElementById('dash-upnext').innerHTML = unwatched.map(film => `
    <div class="dash-movie-row" onclick="openFilm('${film.id}')">
      <div class="dash-movie-info">
        <div class="dash-movie-title">${film.t}</div>
        <div class="dash-movie-year">${film.y} · ${film.cluster}</div>
      </div>
      <span style="font-size:12px;color:var(--muted)">#${film.num}</span>
    </div>
  `).join('');
}

// FILMS
function renderFilms() {
  const genres = [...new Set(CLUSTERS.map(c => c.genre))];
  document.getElementById('genre-filters').innerHTML = genres.map(g =>
    `<button class="genre-pill${activeGenreFilter===g?' on':''}" style="${activeGenreFilter===g?`background:${GENRE_COLORS[g]};border-color:${GENRE_COLORS[g]};color:#fff`:''}" onclick="setGenre('${g}')">${g}</button>`
  ).join('') + `<button class="genre-pill${activeGenreFilter==='all'?' on':''}" style="${activeGenreFilter==='all'?'background:#555;border-color:#555;color:#fff':''}" onclick="setGenre('all')">All</button>`;

  const q = document.getElementById('films-search').value.toLowerCase();
  const pid = currentProfile.id;
  let html = '';
  let num = 1;

  CLUSTERS.forEach(cluster => {
    if (activeGenreFilter !== 'all' && cluster.genre !== activeGenreFilter) { num += cluster.films.length; return; }
    const films = cluster.films.filter(f => !q || f.t.toLowerCase().includes(q) || String(f.y).includes(q));
    if (q && !films.length) { num += cluster.films.length; return; }
    const gc = GENRE_COLORS[cluster.genre] || '#888';
    html += `<div class="cluster-block">
      <div class="cluster-hd" style="border-color:${gc}">
        <span class="cluster-genre-tag" style="background:${gc}22;color:${gc}">${cluster.genre}</span>
        <span class="cluster-name">${cluster.name}</span>
      </div>
      <div class="cluster-desc">${cluster.lineage} — ${cluster.desc}</div>
      <div class="film-grid">`;

    cluster.films.forEach((f, fi) => {
      if (q && !f.t.toLowerCase().includes(q) && !String(f.y).includes(q)) { num++; return; }
      const filmRatings = ratings[f.id] || {};
      const myR = filmRatings[pid] || {};
      const watchDots = profiles.map(p => {
        const r = filmRatings[p.id] || {};
        return `<div class="watch-dot${r.watched?' seen':''}" style="${r.watched?`background:${p.color}`:''}"></div>`;
      }).join('');
      html += `<div class="film-card g-${cluster.genre.replace(/[^a-z]/gi,'-')}" style="border-left-color:${gc}" onclick="openFilm('${f.id}')">
        <div class="film-card-num">#${num}</div>
        <div class="film-card-title">${f.t}</div>
        <div class="film-card-year">${f.y}</div>
        <div class="film-card-note">${f.n}</div>
        <div class="film-card-footer">
          <div class="watch-dots">${watchDots}</div>
          ${myR.stars ? `<div class="stars-mini">${'★'.repeat(myR.stars)}</div>` : ''}
        </div>
      </div>`;
      num++;
    });
    html += '</div></div>';
  });

  document.getElementById('films-list').innerHTML = html || '<div style="color:var(--muted);padding:2rem 0;text-align:center">No films match your search.</div>';
}

function setGenre(g) {
  activeGenreFilter = g;
  renderFilms();
}

// FILM DETAIL
function openFilm(id) {
  currentFilmId = id;
  const film = allFilms.find(f => f.id === id);
  if (!film) return;
  const gc = GENRE_COLORS[film.genre] || '#888';
  const pid = currentProfile.id;
  const myR = ratings[id]?.[pid] || {};

  let ratingsHtml = profiles.map(p => {
    const r = ratings[id]?.[p.id] || {};
    const isMe = p.id === pid;
    const starsHtml = [1,2,3,4,5].map(s =>
      `<span class="star${r.stars>=s?' lit':''}" ${isMe?`onclick="setStar('${id}','${p.id}',${s})"`:''} data-star="${s}" data-profile="${p.id}">${r.stars>=s?'★':'☆'}</span>`
    ).join('');
    return `<div class="rating-row">
      <div class="rating-row-header">
        <span class="rating-row-emoji">${p.emoji}</span>
        <span class="rating-row-name">${p.name}</span>
        ${isMe ? '<span class="rating-row-badge">you</span>' : ''}
      </div>
      <div class="watched-toggle">
        <div class="toggle-switch" ${isMe?`onclick="toggleWatched('${id}','${p.id}')"`:'style="pointer-events:none"'}>
          <div class="toggle-track${r.watched?' on':''}"><div class="toggle-thumb"></div></div>
        </div>
        <span class="toggle-label">${r.watched ? 'Watched' : 'Not yet'}</span>
      </div>
      ${r.watched ? `<div class="star-row" style="${!isMe?'pointer-events:none':''}">${starsHtml}</div>` : ''}
      ${r.watched && isMe ? `<textarea class="reaction-input" rows="2" placeholder="One line reaction..." onblur="saveReaction('${id}','${p.id}',this.value)">${r.reaction||''}</textarea>` : ''}
      ${r.watched && !isMe && r.reaction ? `<div class="reaction-display">"${r.reaction}"</div>` : ''}
    </div>`;
  }).join('');

  const isDiscuss = profiles.some(p => ratings[id]?.[p.id]?.discuss);
  const myDiscuss = myR.discuss;

  document.getElementById('film-modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal('modal-film')">✕</button>
    <div class="film-detail-header">
      <div class="film-detail-genre" style="color:${gc}">${film.genre} · ${film.cluster}</div>
      <div class="film-detail-title">${film.t}</div>
      <div class="film-detail-meta">${film.y} · #${film.num} in the sequence</div>
    </div>
    ${film.n ? `<div class="film-detail-note">${film.n}</div>` : ''}
    <div class="ratings-section">${ratingsHtml}</div>
    <button class="discuss-btn${myDiscuss?' active':''}" onclick="toggleDiscuss('${id}','${pid}')">
      ${myDiscuss ? '💬 You flagged this for discussion' : '💬 Flag for family discussion'}
    </button>
  `;

  document.getElementById('modal-film').classList.add('open');
}

function ensureRating(movieId, profileId) {
  if (!ratings[movieId]) ratings[movieId] = {};
  if (!ratings[movieId][profileId]) ratings[movieId][profileId] = { movie_id: movieId, profile_id: profileId };
}

function toggleWatched(movieId, profileId) {
  const current = ratings[movieId]?.[profileId]?.watched || false;
  const patch = { watched: !current, watched_at: !current ? new Date().toISOString() : null };
  ensureRating(movieId, profileId);
  Object.assign(ratings[movieId][profileId], patch);
  openFilm(movieId);
  renderFilms();
  upsertRating(movieId, profileId, patch);
}

function setStar(movieId, profileId, stars) {
  ensureRating(movieId, profileId);
  ratings[movieId][profileId].stars = stars;
  openFilm(movieId);
  renderFilms();
  upsertRating(movieId, profileId, { stars });
}

function saveReaction(movieId, profileId, reaction) {
  ensureRating(movieId, profileId);
  ratings[movieId][profileId].reaction = reaction;
  upsertRating(movieId, profileId, { reaction });
  showToast('Saved');
}

function toggleDiscuss(movieId, profileId) {
  const current = ratings[movieId]?.[profileId]?.discuss || false;
  ensureRating(movieId, profileId);
  ratings[movieId][profileId].discuss = !current;
  openFilm(movieId);
  if (activeTab === 'discuss') renderDiscuss();
  showToast(current ? 'Removed from discussion list' : 'Added to discussion list');
  upsertRating(movieId, profileId, { discuss: !current });
}

// DISCUSS
function renderDiscuss() {
  const discussFilms = allFilms.filter(f => profiles.some(p => ratings[f.id]?.[p.id]?.discuss));
  if (!discussFilms.length) {
    document.getElementById('discuss-list').innerHTML = `<div class="discuss-empty">
      <div style="font-size:48px;margin-bottom:1rem">💬</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:0.5rem">Nothing flagged yet</div>
      <div style="font-size:13px">When someone wants to talk about a film, it'll appear here.</div>
    </div>`;
    return;
  }
  document.getElementById('discuss-list').innerHTML = discussFilms.map(film => {
    const reactions = profiles.map(p => {
      const r = ratings[film.id]?.[p.id];
      if (!r || !r.watched) return '';
      return `<div class="discuss-reaction-row">
        <span class="discuss-reaction-emoji">${p.emoji}</span>
        <div>
          ${r.stars ? `<span class="discuss-reaction-stars">${'★'.repeat(r.stars)}</span> ` : ''}
          ${r.reaction ? `<span class="discuss-reaction-text">"${r.reaction}"</span>` : '<span style="color:var(--muted2);font-size:12px">No reaction yet</span>'}
        </div>
      </div>`;
    }).filter(Boolean).join('');
    return `<div class="discuss-card" onclick="openFilm('${film.id}')">
      <div class="discuss-card-title">${film.t} (${film.y})</div>
      <div class="discuss-card-cluster">${film.cluster}</div>
      <div class="discuss-reactions">${reactions || '<span style="color:var(--muted2);font-size:12px">Nobody has watched this yet</span>'}</div>
    </div>`;
  }).join('');
}

// UTILITIES
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

init();
</script>
</body>
</html>
